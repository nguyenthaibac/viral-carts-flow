name: Weekly Trending Products Update

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-upload:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # CRITICAL: If you use a package-lock.json, this caches your deps
          cache: 'npm' 

      # ─────────────────────────────────────────────────────
      # NEW STEP: Install Dependencies
      # ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Refresh trending products
        # Logic check: If refresh-trends.js is in a folder, use node folder/refresh-trends.js
        run: node refresh-trends.js

      - name: Commit updated products
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trending-products.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly trending products refresh ($(date +%Y-%m-%d))"
            git pull --rebase origin main
            git push
          fi

      - name: Upload to Shopify
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        # Logic check: Ensure flow.js exists in the root directory
        run: node flow.js

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_id }}
          path: run-log-*.json
          if-no-files-found: warn
          retention-days: 30
